name: Deploy to ECS

on:
  workflow_run:
    workflows: [ "CI" ]
    types: [ completed ]
    # Keep explicit production deploy branches aligned with repository policy.
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-south-1
      ECR_REPOSITORY: ev-queue-3
      ECS_CLUSTER: ev-queue-3-cluster
      ECS_SERVICE: ev-queue-3-service


    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SOURCE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
        run: |
          IMAGE_TAG="$SOURCE_SHA"
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Register updated ECS task definition
        id: task-def
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image_uri }}
        run: |
          CURRENT_TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query "services[0].taskDefinition" \
            --output text)

          aws ecs describe-task-definition \
            --task-definition "$CURRENT_TASK_DEF_ARN" \
            --query "taskDefinition" > task-definition.json

          jq --arg IMAGE_URI "$IMAGE_URI" '
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            | .containerDefinitions[0].image = $IMAGE_URI
            | .containerDefinitions[0].portMappings = [{"containerPort": 80, "hostPort": 80, "protocol": "tcp"}]
          ' task-definition.json > task-definition-updated.json

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://task-definition-updated.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "task_definition_arn=$NEW_TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      - name: Deploy to ECS service
        env:
          TASK_DEFINITION_ARN: ${{ steps.task-def.outputs.task_definition_arn }}
          ECS_SUBNETS: ${{ secrets.ECS_PUBLIC_SUBNET_IDS }}
          ECS_SECURITY_GROUP: ${{ secrets.ECS_SECURITY_GROUP_ID }}
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "$TASK_DEFINITION_ARN" \
            --desired-count 1 \
            --force-new-deployment \
            --network-configuration "awsvpcConfiguration={subnets=[$ECS_SUBNETS],securityGroups=[$ECS_SECURITY_GROUP],assignPublicIp=ENABLED}" \
            --region "$AWS_REGION"

          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION"

      - name: Get ECS task public IP
        id: get-ip
        run: |
          TASK_ARN=$(aws ecs list-tasks \
            --cluster "$ECS_CLUSTER" \
            --service-name "$ECS_SERVICE" \
            --query "taskArns[0]" \
            --output text)

          ENI_ID=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --query "tasks[0].attachments[0].details[?name=='networkInterfaceId'].value" \
            --output text)

          PUBLIC_IP=$(aws ec2 describe-network-interfaces \
            --network-interface-ids "$ENI_ID" \
            --query "NetworkInterfaces[0].Association.PublicIp" \
            --output text)

          echo "public_ip=$PUBLIC_IP" >> "$GITHUB_OUTPUT"
          echo "Task running at $PUBLIC_IP"

      - name: Update DuckDNS
        env:
          PUBLIC_IP: ${{ steps.get-ip.outputs.public_ip }}
          DUCKDNS_TOKEN: ${{ secrets.DUCKDNS_TOKEN }}
        run: |
          RESPONSE=$(curl -s "https://www.duckdns.org/update?domains=evcharge&token=$DUCKDNS_TOKEN&ip=$PUBLIC_IP")
          echo "DuckDNS response: $RESPONSE"
          if [ "$RESPONSE" != "OK" ]; then
            echo "DuckDNS update failed"
            exit 1
          fi
          echo "Updated evcharge.duckdns.org → $PUBLIC_IP"
