name: CI

on:
  pull_request:
  push:
    branches: [ "**" ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff pip-audit

      - name: Lint
        run: ruff check . --select E9,F63,F7,F82

      - name: Run tests
        env:
          BOOTSTRAP_SIMULATION: "false"
        run: pytest -q

      - name: Dependency vulnerability scan
        run: pip-audit -r requirements.txt --progress-spinner off
